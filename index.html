<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fidely | Tu motor de ventas 24/7 para clínicas estéticas</title>
<meta name="description" content="Fidely convierte clientes esporádicos en suscriptores mensuales. Membresías, puntos y referidos con tu propia app. Para clínicas estéticas en España.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://fidelyapp.es">
<meta property="og:title" content="Fidely | Tu motor de ventas 24/7 para clínicas estéticas">
<meta property="og:description" content="Membresías, puntos y referidos con tu propia app. La plataforma de fidelización para clínicas estéticas en España.">
<meta property="og:image" content="https://fidelyapp.es/og-image.jpg">
<meta property="og:url" content="https://fidelyapp.es">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Fidely",
  "url": "https://fidelyapp.es",
  "description": "Plataforma de fidelización white-label para clínicas estéticas en España. Membresías, puntos, referidos y reservas.",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "iOS, Android",
  "offers": {
    "@type": "Offer",
    "priceCurrency": "EUR",
    "availability": "https://schema.org/InStock"
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<!-- Banner de cookies -->
<div id="cookie-banner" style="display:none;position:fixed;left:24px;right:24px;bottom:24px;max-width:560px;margin:0 auto;background:white;border:1px solid #EAECF0;border-radius:16px;box-shadow:0 20px 60px rgba(27,35,64,0.18);padding:22px 24px;z-index:9999;font-family:'DM Sans',sans-serif;color:#2A3142;">
  <div style="font-family:'Playfair Display',serif;font-weight:600;font-size:18px;color:#1B2340;margin-bottom:6px;">Cookies en este sitio</div>
  <div style="font-size:13.5px;line-height:1.55;color:#6B7280;margin-bottom:14px;">Usamos cookies técnicas necesarias para el funcionamiento del sitio. Puedes aceptarlas o rechazar las opcionales. Más información en nuestra <a href="cookies.html" style="color:#27AE60;text-decoration:underline;">Política de Cookies</a>.</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button id="cookie-accept" style="flex:1;min-width:120px;background:#2ECC71;color:white;border:none;padding:11px 16px;border-radius:10px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;">Aceptar todas</button>
    <button id="cookie-reject" style="flex:1;min-width:120px;background:white;color:#1B2340;border:1px solid #EAECF0;padding:11px 16px;border-radius:10px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;">Rechazar opcionales</button>
    <a href="cookies.html" style="flex-basis:100%;text-align:center;padding:8px 0;color:#6B7280;font-size:12.5px;text-decoration:underline;">Configurar</a>
  </div>
</div>

<script>
(function(){
  var KEY = 'fidely_consent';
  try {
    if (!localStorage.getItem(KEY)) {
      var b = document.getElementById('cookie-banner');
      b.style.display = 'block';
      document.getElementById('cookie-accept').onclick = function(){
        localStorage.setItem(KEY, JSON.stringify({all:true, ts:Date.now()}));
        b.style.display = 'none';
      };
      document.getElementById('cookie-reject').onclick = function(){
        localStorage.setItem(KEY, JSON.stringify({all:false, ts:Date.now()}));
        b.style.display = 'none';
      };
    }
  } catch(e) {}
})();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
